<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacano sites</title>
    <style>
        header {
            background-color: rgb(129, 240, 230);
            color: rgb(255, 69, 32);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            border: 5px solid #7510af;
            padding: 16px;
        }
        main {
           background-color: azure;
            color: darkred;
            text-align: center;
            margin: 0 auto;
   
        }
        img {
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu site</h1>
        <p>Esse site foi feito na teoria intelectual</p>
    </header>
    <main>
        <img src="download.jpeg" alt="icone de computador">
       
        <div>
            <h2>Post quarta-feira diversao</h2>
            <p>by LK</p>
            <p>Blog bacanu! Aqui é teoria pura</p>
            <button>🤙<span>0</span></button>
        </div>
           
    </main>
</body>

<script>
    const botao = document.querySelector("button");
    botao.addEventListener("click",botaoClicado);

    function botaoClicado () {
        console.log("fui clicado");
        let texto = botao.querySelector("span");
        texto.textContent++;
    }
</script>

</html>
